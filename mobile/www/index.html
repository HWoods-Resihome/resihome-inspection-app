<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ResiWALK</title>
  <style>
    :root { --brand: #ff0060; --ink: #111827; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff; color: var(--ink); padding: 24px; text-align: center;
    }
    .wrap { max-width: 360px; }
    .logo { font-weight: 800; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 8px; }
    .logo span { color: var(--brand); }
    h1 { font-size: 18px; margin: 16px 0 8px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
    button {
      background: var(--brand); color: #fff; border: 0; border-radius: 12px;
      padding: 14px 24px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">RESI<span>WALK</span></div>
    <h1>Can't reach the network</h1>
    <p>ResiWALK needs a connection to load. Check your signal or Wi-Fi and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
  <script>
    // Stage 0 has no offline capability yet (that's Stage 2+). This page only
    // appears if the live app couldn't load at launch. Auto-retry when the
    // device regains connectivity.
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
