name: Services nightly (ppw preview)

# Vercel runs the crons declared in vercel.json ONLY on the production deployment.
# The Services feature ships on the `recurring-services` PREVIEW (ppw.resiwalk.com),
# where Vercel crons don't fire — so this scheduled workflow pokes the same cron
# endpoints against ppw with the CRON_SECRET.
#
# Requirements:
#   • Add a repo Actions secret `CRON_SECRET` matching the CRON_SECRET env var on
#     the ppw Vercel (preview) deployment.
#   • GitHub only runs `schedule:` triggers from the workflow file on the DEFAULT
#     branch — this file must be on the default branch for the nightly schedule to
#     fire. `workflow_dispatch` (Run workflow button) works from any branch now.
#
# Retire this workflow once the feature is on production (Vercel crons take over).

on:
  schedule:
    - cron: '0 11 * * *'   # ~7:00 AM ET — generate work orders from active rules
    - cron: '30 11 * * *'  # ~7:30 AM ET — AI review of submitted services
  workflow_dispatch:

jobs:
  services-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Generate work orders (rules → services)
        if: github.event.schedule != '30 11 * * *'
        run: |
          curl -fsS --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://ppw.resiwalk.com/api/cron/services-generate"
      - name: AI review of submitted services
        if: github.event.schedule != '0 11 * * *'
        run: |
          curl -fsS --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://ppw.resiwalk.com/api/cron/services-review"
