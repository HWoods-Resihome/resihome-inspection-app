name: iOS TestFlight

# Builds the ResiWALK Capacitor iOS shell on a hosted macOS runner and ships it
# to TestFlight. This is NATIVE-ONLY and has ZERO effect on the web app: it never
# touches the web build and Vercel does not deploy from workflow files.
#
# This workflow lives on `chore/native-oauth-outbound` (NOT the default branch),
# so the Actions-tab "Run workflow" button and the workflow_dispatch API only
# work once a copy of this file is also on `main`. To run it WITHOUT touching
# main, it triggers on push to this branch (scoped to native paths below) — so
# pushing a native change here builds + uploads to TestFlight. `workflow_dispatch`
# is kept too for when this file eventually lands on main.
#
# Required repo Secrets (Settings -> Secrets and variables -> Actions):
#   ASC_KEY_ID      App Store Connect API Key ID
#   ASC_ISSUER_ID   App Store Connect API issuer ID
#   ASC_KEY_P8      the API .p8 private key, base64-encoded  (`base64 -i AuthKey_XXX.p8`)
#   APPLE_TEAM_ID   10-char Apple Developer Team ID
#   MATCH_PASSWORD  passphrase that encrypts the match cert/profile git storage
#
# Signing uses fastlane match: the distribution cert + App Store profile are
# stored ENCRYPTED on the `ios-signing-certs` branch of this repo and reused by
# every build. The job's GITHUB_TOKEN (contents: write) authenticates match's
# git access via the url.insteadOf config in the "Configure git auth" step.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Note for this build (shows in the run title)"
        required: false
        default: "Manual TestFlight build"
  # Run on push to the native branch. Path-scoped so unrelated commits (and the
  # web app) never spend paid macOS minutes — only native/shell/workflow changes
  # build. (workflow_dispatch above still works once this file is on main.)
  push:
    branches:
      - chore/native-oauth-outbound
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-testflight.yml'

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 75
    # match stores the encrypted cert/profile on a branch in this repo; the
    # GITHUB_TOKEN needs write access to push it.
    permissions:
      contents: write
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      BUILD_NUMBER: ${{ github.run_number }}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: Checkout (native branch)
        uses: actions/checkout@v4

      - name: Preflight — required secrets present
        run: |
          missing=0
          for v in ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8 APPLE_TEAM_ID MATCH_PASSWORD; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret $v"; missing=1; fi
          done
          [ "$missing" -eq 0 ] || { echo "Set the secrets listed in this workflow's header."; exit 1; }

      - name: Configure git auth for match (encrypted cert storage in this repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.1.app 2>/dev/null || true
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor + native deps
        working-directory: mobile
        run: npm install

      - name: Generate + sync the iOS project
        working-directory: mobile
        run: |
          if [ ! -d ios ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Apply parked iOS native files (idempotent)
        run: bash mobile/ios-pending/apply-ios.sh

      - name: Build + upload to TestFlight (fastlane)
        working-directory: mobile/ios/App
        run: |
          bundle install
          bundle exec fastlane beta

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            mobile/ios/App/build
            ~/Library/Logs/gym
          if-no-files-found: ignore
          retention-days: 7
